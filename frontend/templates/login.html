<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloodLinkAI Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
<style>
:root {
    /* CLEAN CLINICAL TEAL & BLUE PALETTE (LIGHT MODE ADJUSTED) */
    --sky: #0ea5e9;           
    --teal: #0d9488;    
    --mint: #14b8a6;          
    --bg: #ffffff;            /* Pure, high-end white canvas */
    --font-head: 'Plus Jakarta Sans', sans-serif;
    --font-body: 'DM Sans', sans-serif;
}

body {
    background: var(--bg);
    color: #1e293b;           /* Slate 800 for clean, premium readability */
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
}

h1 {
    font-family: var(--font-head);
}

.auth-card {
    background: #ffffff;
    border: 1px solid #e2e8f0; /* Slate 200 clean bounding line */
    box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.08); /* Deep soft corporate shadow */
}

.btn-primary-gradient {
    background: linear-gradient(135deg, var(--sky), var(--teal));
    transition: all 0.2s ease-in-out;
}

.btn-primary-gradient:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(13, 148, 136, 0.2);
    background: linear-gradient(135deg, #0284c7, #117a6f);
}

.input-field {
    background-color: #f8fafc; /* Slate 50 ultra-soft input base */
    border: 1px solid #cbd5e1; /* Slate 300 */
    color: #0f172a;
    transition: all 0.2s ease;
}

.input-field:focus {
    background-color: #ffffff;
    border-color: var(--sky);
    box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
}

.btn-secondary-outline {
    border: 1px solid #e2e8f0;
    background: #ffffff;
    color: #334155;
    transition: all 0.2s ease;
}

.btn-secondary-outline:hover {
    background: #f8fafc;
    border-color: #cbd5e1;
}

.custom-checkbox {
    accent-color: var(--teal);
}
</style>
</head>
<body class="flex items-center justify-center min-h-screen py-10 px-4 sm:px-6 relative">

<div class="auth-card rounded-2xl sm:rounded-3xl p-6 sm:p-10 w-full max-w-md mx-auto">
    
    <div class="text-center mb-6 sm:mb-8">
        <div class="w-14 h-14 sm:w-16 sm:h-16 mx-auto rounded-xl btn-primary-gradient flex items-center justify-center shadow-md">
            <svg viewBox="0 0 24 24" fill="white" class="w-7 h-7 sm:w-8 sm:h-8">
                <path d="M12 2C12 2 5 10 5 15a7 7 0 0014 0c0-5-7-13-7-13z"/>
            </svg>
        </div>
        <h1 class="text-3xl sm:text-4xl font-extrabold mt-4 tracking-tight text-slate-900">BloodLink<span style="color: var(--teal)">AI</span></h1>
        <p class="text-slate-500 text-sm sm:text-base mt-2 font-normal">Welcome back. Sign in to continue.</p>
    </div>

    <form onsubmit="return false;">
        <div class="mb-4 sm:mb-5">
            <label class="block mb-2 text-xs sm:text-sm font-semibold text-slate-700">Email Address</label>
            <input type="email" autocomplete="email" placeholder="name@example.com" required
            class="w-full px-4 py-2.5 sm:py-3 rounded-xl text-sm input-field focus:outline-none">
        </div>

        <div class="mb-3">
            <label class="block mb-2 text-xs sm:text-sm font-semibold text-slate-700">Password</label>
            <input type="password" autocomplete="current-password" placeholder="••••••••" required
            class="w-full px-4 py-2.5 sm:py-3 rounded-xl text-sm input-field focus:outline-none">
        </div>

        <div class="flex justify-between items-center mb-5 sm:mb-6 text-xs sm:text-sm">
            <label class="flex items-center gap-2 cursor-pointer text-slate-600 hover:text-slate-900 select-none font-medium">
                <input type="checkbox" class="custom-checkbox rounded w-4 h-4"> Remember me
            </label>
            <a href="#" style="color: var(--teal)" class="hover:underline font-semibold transition-colors">Forgot Password?</a>
        </div>

        <button type="submit" class="w-full py-2.5 sm:py-3 rounded-xl font-bold text-white text-sm btn-primary-gradient shadow-sm">
            Sign In
        </button>
    </form>

    <div class="my-5 sm:my-6 flex items-center">
        <div class="flex-1 border-t border-slate-200"></div>
        <span class="px-4 text-xs font-bold text-slate-400 tracking-wider">OR</span>
        <div class="flex-1 border-t border-slate-200"></div>
    </div>

    <button class="w-full py-2.5 sm:py-3 rounded-xl text-sm font-semibold flex items-center justify-center gap-2.5 btn-secondary-outline shadow-sm">
        <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#EA4335" d="M12 5.04c1.62 0 3.08.56 4.22 1.65l3.15-3.15C17.45 1.68 14.93 1 12 1 7.35 1 3.39 3.65 1.42 7.53l3.78 2.93c.9-2.69 3.42-4.42 6.8-4.42z"/>
            <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.51h6.46c-.28 1.48-1.12 2.74-2.38 3.58l3.7 2.87c2.16-1.99 3.41-4.92 3.41-8.6z"/>
            <path fill="#FBBC05" d="M5.2 14.54c-.24-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29L1.42 7.03C.52 8.83 0 10.85 0 13s.52 4.17 1.42 5.97l3.78-2.93z"/>
            <path fill="#34A853" d="M12 23c3.24 0 5.97-1.08 7.96-2.92l-3.7-2.87c-1.03.69-2.35 1.11-3.92 1.11-3.38 0-5.9-1.73-6.8-4.42L1.72 16.83C3.69 20.44 7.55 23 12 23z"/>
        </svg>
        Continue with Google
    </button>

    <p class="text-center text-xs sm:text-sm text-slate-500 mt-6 font-medium">
        Don't have an account?
<a href="{{ url_for('register') }}" style="color: var(--teal)" class="hover:underline font-bold ml-1 transition-colors">
    Register
</a>
    </p>
</div>

</body>
</html>
